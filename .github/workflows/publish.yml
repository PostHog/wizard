name: "Publish"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-package-version:
    name: Check package version and detect an update
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      committed-version: ${{ steps.check-package-version.outputs.committed-version }}
      published-version: ${{ steps.check-package-version.outputs.published-version }}
      is-new-version: ${{ steps.check-package-version.outputs.is-new-version }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check package version and detect an update
        id: check-package-version
        uses: PostHog/check-package-version@97f76f610f6c3d259e2eac4f2783adbb84ac8493 # v2

  release:
    name: Publish release if new version
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: check-package-version
    if: needs.check-package-version.outputs.is-new-version == 'true'
    env:
      COMMITTED_VERSION: ${{ needs.check-package-version.outputs.committed-version }}
      PUBLISHED_VERSION: ${{ needs.check-package-version.outputs.published-version }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: 'package.json'
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install -g pnpm

      # TODO: Remove once @posthog/warlock is published to npm
      - name: Generate token for private dependencies
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
          repositories: warlock
      - name: Configure git auth for private deps
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Clone and build warlock
        run: git clone https://github.com/PostHog/warlock.git ../warlock && cd ../warlock && pnpm install && pnpm build
      - name: Install package.json dependencies with pnpm
        run: pnpm install --frozen-lockfile

      - name: Build the package
        run: pnpm build
        
      - name: Publish the package in the npm registry
        run: pnpm publish --access public
