name: Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: 'App to test (e.g. next-js/15-app-router-todo)'
        required: false
        default: 'next-js/15-app-router-todo'
        type: string

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test (${{ inputs.app || 'next-js/15-app-router-todo' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout wizard
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout wizard-workbench
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PostHog/wizard-workbench
          path: wizard-workbench

      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      # TODO: Remove once @posthog/warlock is published to npm
      - name: Generate token for private dependencies
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
          repositories: warlock
      - name: Configure git auth for private deps
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Clone and build warlock
        run: git clone https://github.com/PostHog/warlock.git ../warlock && cd ../warlock && pnpm install && pnpm build
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_POSTHOG_PERSONAL_KEY }}
          WIZARD_WORKBENCH_ROOT: ${{ github.workspace }}/wizard-workbench
          SMOKE_TEST_APP: ${{ inputs.app || 'next-js/15-app-router-todo' }}
        run: ./scripts/smoke-test-ci.sh "$SMOKE_TEST_APP"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-test-artifacts
          path: /tmp/wizard-smoke.*/**
          if-no-files-found: ignore