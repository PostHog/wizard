name: 'Build & Test'
on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  job_build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.23.0
          run_install: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      # TODO: Remove once @posthog/warlock is published to npm
      - name: Generate token for private dependencies
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
          repositories: warlock
      - name: Configure git auth for private deps
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Clone and build warlock
        run: git clone https://github.com/PostHog/warlock.git ../warlock && cd ../warlock && pnpm install && pnpm build
      - name: Install dependencies with pnpm
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Pack
        run: pnpm pack
      - name: Archive Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.sha }}
          path: |
            ${{ github.workspace }}/*.tgz

  job_lint:
    name: Lint
    needs: job_build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.23.0
          run_install: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      # TODO: Remove once @posthog/warlock is published to npm
      - name: Generate token for private dependencies
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
          repositories: warlock
      - name: Configure git auth for private deps
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Clone and build warlock
        run: git clone https://github.com/PostHog/warlock.git ../warlock && cd ../warlock && pnpm install && pnpm build
      - name: Install dependencies with pnpm
        run: pnpm install --frozen-lockfile
      - name: Run Linter
        run: pnpm lint

  job_test:
    name: Node (${{ matrix.node }}) Unit Tests
    needs: job_build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20.20.0', '22.22.0', 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.23.0
          run_install: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      # TODO: Remove once @posthog/warlock is published to npm
      - name: Generate token for private dependencies
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
          repositories: warlock
      - name: Configure git auth for private deps
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Clone and build warlock
        run: git clone https://github.com/PostHog/warlock.git ../warlock && cd ../warlock && pnpm install && pnpm build
      - name: Install dependencies with pnpm
        run: pnpm install --frozen-lockfile
      - name: Run Unit Tests
        run: pnpm test
      - name: Push code coverage to codecov
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3 # pin@v5.3.1
        with:
          # Need to specify the token here, as the codecov action requires it for protected branches.
          # If not set, this error is shown: `Token required because branch is protected`
          token: ${{ secrets.CODECOV_TOKEN }}
          # Do not fail the build if codecov fails to report the coverage.
          fail_ci_if_error: false
          flags: unit-tests
